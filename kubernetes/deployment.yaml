apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-model-serving
  labels:
    app: ml-model-serving
    version: v1
spec:
  replicas: 3  # Run 3 copies of the pod
  strategy:
    type: RollingUpdate  # Replace pods one at a time during updates
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  
  selector:
    matchLabels:
      app: ml-model-serving
  
  template:
    metadata:
      labels:
        app: ml-model-serving
        version: v1
    
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: model-serving
        image: ghcr.io/bhavinvadalia/ml-model-serving:latest
        imagePullPolicy: Always  # Use local image (remove for Azure)
        
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        
        # Resource requests (what container needs)
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        # Liveness probe: restart if unhealthy
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Readiness probe: remove from load balancer if not ready
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 1
        
        # Environment variables (optional)
        env:
        - name: LOG_LEVEL
          value: "INFO"
        - name: MODEL_VERSION
          value: "1.0.0"