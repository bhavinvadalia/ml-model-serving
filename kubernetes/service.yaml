apiVersion: v1
kind: Service
metadata:
  name: ml-model-serving
  labels:
    app: ml-model-serving
spec:
  type: LoadBalancer  # Expose externally
  selector:
    app: ml-model-serving
  ports:
  - name: http
    port: 80           # External port
    targetPort: 8000   # Container port
    protocol: TCP